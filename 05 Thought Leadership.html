  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

/* =======================================================\n   EMKAY THOUGHT LEADERSHIP — Editorial Micro-site\n   Are.na-inspired · Dual mode · Channel-based browsing\n   ======================================================= */\n\n*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }\nhtml { scroll-behavior: smooth; }\n\n/* ── CSS VARIABLES: LIGHT MODE (default) ─────────────── */\n:root {\n  --bg:        #F5F0E6;\n  --bg-card:   #FFFFFF;\n  --bg-local:  #F5F0E6;\n  --bg-conf:   #004875;\n  --border:    rgba(0,72,117,0.12);\n  --border-nav:rgba(0,72,117,0.08);\n  --text1:     #004875;\n  --text2:     rgba(0,72,117,0.55);\n  --text3:     rgba(0,72,117,0.35);\n  --orange:    #EF8A00;\n  --blue:      #004875;\n  --pill-idle: rgba(0,72,117,0.08);\n  --pill-text: #004875;\n  --tag-bg:    rgba(0,72,117,0.08);\n  --tag-text:  #004875;\n  --illo:      #004875;\n  --shadow:    0 4px 24px rgba(0,72,117,0.08);\n  --shadow-sm: 0 2px 8px rgba(0,72,117,0.06);\n  --input-border: rgba(0,72,117,0.25);\n  --search-bg: rgba(0,72,117,0.04);\n}\n\n/* ── CSS VARIABLES: DARK MODES ───────────────────────── */\n[data-mode=\"dark\"][data-dark-bg=\"charcoal\"] {\n  --bg:        #141418;\n  --bg-card:   #1E1E24;\n  --bg-local:  #1A1A20;\n  --border:    rgba(255,255,255,0.08);\n  --border-nav:rgba(255,255,255,0.08);\n  --text1:     #FFFFFF;\n  --text2:     rgba(245,240,230,0.55);\n  --text3:     rgba(245,240,230,0.3);\n  --pill-idle: rgba(255,255,255,0.07);\n  --pill-text: rgba(245,240,230,0.7);\n  --tag-bg:    rgba(255,255,255,0.08);\n  --tag-text:  rgba(245,240,230,0.6);\n  --illo:      #EF8A00;\n  --shadow:    0 4px 24px rgba(0,0,0,0.3);\n  --shadow-sm: 0 2px 8px rgba(0,0,0,0.25);\n  --input-border: rgba(255,255,255,0.2);\n  --search-bg: rgba(255,255,255,0.04);\n}\n[data-mode=\"dark\"][data-dark-bg=\"black\"] {\n  --bg:        #0A0A0E;\n  --bg-card:   #111116;\n  --bg-local:  #111116;\n  --border:    rgba(255,255,255,0.07);\n  --border-nav:rgba(255,255,255,0.07);\n  --text1:     #FFFFFF;\n  --text2:     rgba(245,240,230,0.52);\n  --text3:     rgba(245,240,230,0.28);\n  --pill-idle: rgba(255,255,255,0.06);\n  --pill-text: rgba(245,240,230,0.65);\n  --tag-bg:    rgba(255,255,255,0.07);\n  --tag-text:  rgba(245,240,230,0.55);\n  --illo:      #EF8A00;\n  --shadow:    0 4px 24px rgba(0,0,0,0.5);\n  --shadow-sm: 0 2px 8px rgba(0,0,0,0.4);\n  --input-border: rgba(255,255,255,0.15);\n  --search-bg: rgba(255,255,255,0.03);\n}\n\n/* ── TRANSITIONS ─────────────────────────────────────── */\n*, *::before, *::after {\n  transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;\n}\n/* Exclude animations from transition override */\n.card, .ch-card, .pill-btn, .tag { transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease, transform 0.25s cubic-bezier(0.16,1,0.3,1), box-shadow 0.25s ease; }\n\nbody {\n  background: var(--bg);\n  color: var(--text1);\n  font-family: 'Open Sans', sans-serif;\n  -webkit-font-smoothing: antialiased;\n  overflow-x: hidden;\n}\n\n/* ── UTILITY BAR ─────────────────────────────────────── */\n.util-bar {\n  position: fixed; top: 0; left: 0; right: 0; height: 32px;\n  background: var(--blue);\n  display: flex; align-items: center; justify-content: space-between;\n  padding: 0 80px; z-index: 500;\n}\n.util-back { font-size: 11px; color: rgba(255,255,255,0.4); text-decoration: none; letter-spacing: 0.06em; display: flex; align-items: center; gap: 8px; transition: color 150ms; }\n.util-back:hover { color: rgba(255,255,255,0.8); }\n.util-links { display: flex; gap: 24px; }\n.util-links a { font-size: 11px; color: rgba(255,255,255,0.28); text-decoration: none; letter-spacing: 0.07em; text-transform: uppercase; }\n.util-links a:hover { color: rgba(255,255,255,0.65); }\n\n/* ── GLOBAL NAV ──────────────────────────────────────── */\n.g-nav {\n  position: fixed; top: 32px; left: 0; right: 0; height: 52px;\n  background: var(--blue);\n  display: flex; align-items: center; padding: 0 80px;\n  z-index: 499; border-bottom: 1px solid rgba(255,255,255,0.1);\n}\n.g-nav-logo { display: flex; align-items: center; gap: 10px; margin-right: 48px; text-decoration: none; }\n.g-nav-logo-text { font-size: 19px; font-weight: 700; color: #fff; letter-spacing: -0.01em; transition: none; }\n.g-nav-links { display: flex; flex: 1; }\n.g-nav-link { font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.45); padding: 0 14px; height: 52px; display: flex; align-items: center; text-decoration: none; transition: color 200ms; white-space: nowrap; position: relative; }\n.g-nav-link:hover { color: rgba(255,255,255,0.85); }\n.g-nav-link.active { color: var(--orange); }\n.g-nav-link.active::after { content: ''; position: absolute; bottom: 0; left: 14px; right: 14px; height: 2px; background: var(--orange); }\n\n/* ── LOCAL HEADER ────────────────────────────────────── */\n.l-header {\n  position: fixed; top: 84px; left: 0; right: 0;\n  background: var(--bg-local);\n  border-bottom: 1px solid var(--border-nav);\n  z-index: 498;\n  transition: height 0.3s ease, background-color 0.3s ease;\n}\n.l-header-main {\n  height: 48px;\n  display: flex; align-items: center; padding: 0 80px; gap: 24px;\n}\n.l-brand {\n  display: flex; align-items: center; gap: 10px;\n  font-size: 11px; font-weight: 500; color: var(--orange);\n  letter-spacing: 0.27em; text-transform: uppercase;\n  flex-shrink: 0; margin-right: 8px;\n}\n.l-brand-icon { stroke: var(--orange); transition: stroke 0.3s ease; }\n.l-filters { display: flex; gap: 6px; flex: 1; }\n.pill-btn {\n  height: 26px; padding: 0 12px; border-radius: 4px;\n  font-size: 12px; font-weight: 500; cursor: pointer;\n  background: var(--pill-idle);\n  color: var(--pill-text);\n  border: 1px solid var(--border);\n  white-space: nowrap; display: flex; align-items: center;\n  letter-spacing: 0.01em;\n}\n.pill-btn.active { background: var(--orange); color: #fff; border-color: var(--orange); }\n.pill-btn:hover:not(.active) { border-color: var(--orange); color: var(--orange); }\n.l-utils { display: flex; align-items: center; gap: 12px; }\n.icon-btn { width: 32px; height: 32px; border: none; background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--orange); border-radius: 4px; }\n.icon-btn:hover { background: rgba(239,138,0,0.1); }\n.icon-btn svg { width: 18px; height: 18px; stroke: var(--orange); fill: none; stroke-width: 1.5; stroke-linecap: round; transition: stroke 0.3s ease; }\n\n/* Search expand */\n.l-search {\n  overflow: hidden; max-height: 0;\n  transition: max-height 0.3s ease;\n  border-top: 0px solid transparent;\n}\n.l-search.open { max-height: 60px; border-top: 1px solid var(--border); }\n.search-input-wrap { padding: 0 80px; height: 52px; display: flex; align-items: center; gap: 16px; }\n.search-input {\n  flex: 1; background: none; border: none; outline: none;\n  border-bottom: 1px solid var(--input-border);\n  font-size: 18px; font-weight: 400; color: var(--text1);\n  padding-bottom: 6px; font-family: 'Open Sans', sans-serif;\n}\n.search-input::placeholder { color: var(--text3); }\n\n/* ── PAGE BODY ───────────────────────────────────────── */\n.page-body { padding-top: 84px + 48px; }\n/* util(32) + gnav(52) + lheader(48) = 132px */\n.page-body { padding-top: 132px; }\n\n/* ── HERO ─────────────────────────────────────────────── */\n.hero {\n  min-height: 80vh;\n  display: flex; align-items: stretch;\n  padding: 0;\n  background: var(--bg);\n}\n.hero-left {\n  flex: 0 0 50%;\n  padding: 72px 80px;\n  display: flex; flex-direction: column; justify-content: center;\n  gap: 0;\n}\n.hero-headline {\n  font-size: 64px; font-weight: 600;\n  color: var(--text1);\n  line-height: 1.05; letter-spacing: -0.025em;\n  max-width: 480px; margin-bottom: 20px;\n}\n.hero-sub {\n  font-size: 18px; font-weight: 400; color: var(--text2);\n  line-height: 1.7; max-width: 420px; margin-bottom: 40px;\n}\n.hero-stats {\n  display: flex; gap: 40px;\n}\n.hero-stat { display: flex; flex-direction: column; gap: 3px; }\n.hero-stat-val { font-size: 28px; font-weight: 600; color: var(--text1); letter-spacing: -0.02em; line-height: 1; }\n.hero-stat-lbl { font-size: 10px; font-weight: 500; color: var(--orange); letter-spacing: 0.22em; text-transform: uppercase; }\n\n/* Hero right */\n.hero-right {\n  flex: 1;\n  padding: 48px 80px 48px 48px;\n  display: flex; align-items: center;\n  border-left: 1px solid var(--border);\n}\n.featured-card {\n  width: 100%; max-width: 520px;\n  background: var(--bg-card);\n  border: 1px solid var(--border);\n  border-radius: 8px;\n  box-shadow: var(--shadow);\n  padding: 28px;\n  display: flex; flex-direction: column; gap: 14px;\n}\n.fc-header { display: flex; justify-content: space-between; align-items: center; }\n.fc-tag { font-size: 10px; font-weight: 500; color: var(--orange); letter-spacing: 0.22em; text-transform: uppercase; }\n.fc-date { font-size: 12px; color: var(--text3); }\n.fc-illo { margin: 4px 0; }\n.fc-headline { font-size: 22px; font-weight: 600; color: var(--text1); line-height: 1.3; letter-spacing: -0.01em; }\n.fc-author { font-size: 13px; color: var(--text3); }\n.fc-excerpt { font-size: 14px; color: var(--text2); line-height: 1.65; }\n.fc-cta { font-size: 14px; font-weight: 500; color: var(--orange); text-decoration: none; display: flex; align-items: center; gap: 6px; transition: gap 200ms; }\n.fc-cta:hover { gap: 10px; }\n\n/* ── CHANNELS SECTION ────────────────────────────────── */\n.channels { padding: 64px 0; }\n.channels-label {\n  padding: 0 80px; margin-bottom: 48px;\n  font-size: 11px; font-weight: 500; color: var(--orange);\n  letter-spacing: 0.27em; text-transform: uppercase;\n  display: flex; align-items: center; gap: 10px;\n}\n.channels-label::before { content: ''; width: 20px; height: 1px; background: var(--orange); }\n\n.channel { margin-bottom: 64px; }\n.channel-header {\n  padding: 0 80px;\n  display: flex; align-items: baseline; gap: 14px;\n  margin-bottom: 16px;\n}\n.channel-name { font-size: 20px; font-weight: 600; color: var(--text1); }\n.channel-desc { font-size: 14px; color: var(--text2); flex: 1; }\n.channel-count { font-size: 13px; color: var(--orange); flex-shrink: 0; }\n.channel-viewall { font-size: 13px; color: var(--orange); text-decoration: none; flex-shrink: 0; transition: none; }\n.channel-viewall:hover { text-decoration: underline; }\n.channel-divider { margin: 0 80px 20px; height: 1px; background: var(--border); }\n\n/* Horizontal scroll row */\n.card-row {\n  display: flex; gap: 16px;\n  overflow-x: auto; padding: 4px 80px 16px;\n  scrollbar-width: none;\n}\n.card-row::-webkit-scrollbar { display: none; }\n\n/* ── CONTENT CARDS ───────────────────────────────────── */\n.ch-card {\n  flex-shrink: 0; width: 240px;\n  background: var(--bg-card);\n  border: 1px solid var(--border);\n  border-radius: 8px;\n  padding: 18px;\n  display: flex; flex-direction: column; gap: 10px;\n  cursor: pointer;\n  box-shadow: var(--shadow-sm);\n}\n.ch-card:hover { transform: translateY(-3px); box-shadow: var(--shadow); }\n\n.card-sector-tag {\n  display: inline-flex; align-items: center;\n  background: var(--orange); color: #fff;\n  font-size: 10px; font-weight: 500; letter-spacing: 0.14em;\n  text-transform: uppercase; padding: 2px 8px;\n  border-radius: 4px; width: fit-content;\n}\n.card-headline { font-size: 15px; font-weight: 600; color: var(--text1); line-height: 1.3; }\n.card-meta { font-size: 12px; color: var(--text3); }\n.card-footer { display: flex; justify-content: space-between; align-items: flex-end; margin-top: auto; }\n.card-tags { display: flex; gap: 4px; flex-wrap: wrap; }\n.tag {\n  font-size: 11px; font-weight: 500;\n  background: var(--tag-bg); color: var(--tag-text);\n  padding: 2px 7px; border-radius: 3px;\n  cursor: pointer; letter-spacing: 0.02em;\n}\n.tag.active { background: var(--orange); color: #fff; }\n.tag:hover:not(.active) { background: rgba(239,138,0,0.12); color: var(--orange); }\n.card-dl { stroke: "/><line x1=\"10\" y1=\"18\" x2=\"10\" y2=\"20\"/><line x1=\"2\" y1=\"10\" x2=\"0\" y2=\"10\"/><line x1=\"18\" y1=\"10\" x2=\"20\" y2=\"10\"/><line x1=\"4\" y1=\"4\" x2=\"2.5\" y2=\"2.5\"/><line x1=\"16\" y1=\"16\" x2=\"17.5\" y2=\"17.5\"/><line x1=\"16\" y1=\"4\" x2=\"17.5\" y2=\"2.5\"/><line x1=\"4\" y1=\"16\" x2=\"2.5\" y2=\"17.5\"/>';\n  } else {\n    icon.innerHTML = '<path d=\"M15 10.5A5 5 0 0 1 9.5 5 5 5 0 0 0 10 15a5 5 0 0 0 5-4.5z\"/>';\n  }\n  window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { darkMode: on } }, '*');\n}\n\nfunction setDarkBg(val) {\n  html.setAttribute('data-dark-bg', val);\n  window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { darkBg: val } }, '*');\n}\n\n// Mode toggle button\ndocument.getElementById('mode-toggle').addEventListener('click', () => {\n  const isDark = html.getAttribute('data-mode') === 'dark';\n  setDark(!isDark);\n  const tw = document.getElementById('tw-dark');\n  if (tw) isDark ? tw.classList.remove('on') : tw.classList.add('on');\n});\n\n// Init from defaults\nif (TWEAK_DEFAULTS.darkMode) { setDark(true); document.getElementById('tw-dark')?.classList.add('on'); }\nif (TWEAK_DEFAULTS.darkBg) setDarkBg(TWEAK_DEFAULTS.darkBg);\n\n/* ── SEARCH ──────────────────────────────────────────── */\nconst searchPanel = document.getElementById('search-panel');\nconst searchInput = document.getElementById('search-input');\nlet searchOpen = false;\ndocument.getElementById('search-btn').addEventListener('click', () => {\n  searchOpen = !searchOpen;\n  searchPanel.classList.toggle('open', searchOpen);\n  if (searchOpen) setTimeout(() => searchInput.focus(), 320);\n});\nsearchInput.addEventListener('keydown', e => {\n  if (e.key === 'Escape') { searchOpen = false; searchPanel.classList.remove('open'); }\n});\n\n/* ── FILTER PILLS ────────────────────────────────────── */\ndocument.getElementById('filter-pills').addEventListener('click', e => {\n  const btn = e.target.closest('.pill-btn');\n  if (!btn) return;\n  document.querySelectorAll('.pill-btn').forEach(b => b.classList.remove('active'));\n  btn.classList.add('active');\n  const filter = btn.dataset.filter;\n  document.querySelectorAll('.ch-card').forEach(card => {\n    if (filter === 'all') {\n      card.classList.remove('filtered-out');\n    } else {\n      const type = card.dataset.type;\n      const match = type === filter || (filter === 'podcasts' && type === 'podcasts') || (filter === 'press' && type === 'press') || (filter === 'confluence' && type === 'confluence');\n      card.classList.toggle('filtered-out', !match);\n    }\n  });\n  // Hide/show channels with no visible cards\n  document.querySelectorAll('.channel').forEach(ch => {\n    const visibleCards = ch.querySelectorAll('.ch-card:not(.filtered-out)');\n    ch.style.display = visibleCards.length === 0 ? 'none' : '';\n  });\n});\n\n/* ── TAG FILTERING ───────────────────────────────────── */\nlet activeTag = null;\ndocument.addEventListener('click', e => {\n  const tag = e.target.closest('.tag');\n  if (!tag || !tag.dataset.tag) return;\n  const tagName = tag.dataset.tag;\n  if (activeTag === tagName) {\n    // Deselect\n    activeTag = null;\n    document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));\n    document.querySelectorAll('.ch-card').forEach(c => c.classList.remove('filtered-out'));\n    document.querySelectorAll('.channel').forEach(ch => ch.style.display = '');\n  } else {\n    activeTag = tagName;\n    document.querySelectorAll('.tag').forEach(t => {\n      t.classList.toggle('active', t.dataset.tag === tagName);\n    });\n    document.querySelectorAll('.ch-card').forEach(card => {\n      const tags = (card.dataset.tags || '').split(',');\n      card.classList.toggle('filtered-out', !tags.includes(tagName));\n    });\n    document.querySelectorAll('.channel').forEach(ch => {\n      const visible = ch.querySelectorAll('.ch-card:not(.filtered-out)');\n      ch.style.display = visible.length === 0 ? 'none' : '';\n    });\n    // Reset filter pills to 'All'\n    document.querySelectorAll('.pill-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === 'all'));\n  }\n});\n\n/* ── TWEAKS EDIT MODE ────────────────────────────────── */\nwindow.addEventListener('message', e => {\n  if (e.data?.type === '__activate_edit_mode') document.getElementById('tweaks-panel').style.display = 'block';\n  if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').style.display = 'none';\n});\nwindow.parent.postMessage({ type: '__edit_mode_available' }, '*');\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
