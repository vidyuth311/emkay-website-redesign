  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

u002Fstyle>\n<style>\n/* ── RESET + BASE ─────────────────────────────────── */\n*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }\nhtml { scroll-behavior: smooth; }\nbody {\n  font-family: 'Open Sans', sans-serif;\n  background: #F5F0E6;\n  color: #004875;\n  font-size: 16px;\n  line-height: 1.6;\n  overflow-x: hidden;\n}\n\n/* ── TOKENS ────────────────────────────────────────── */\n:root {\n  --blue:         #004875;\n  --blue-light:   #005A8F;\n  --blue-dark:    #003357;\n  --orange:       #EF8A00;\n  --orange-dark:  #C97200;\n  --cream:        #F5F0E6;\n  --indigo:       #2E2571;\n  --indigo-sub:   #EDEAF8;\n  --rust:         #B84A1C;\n  --rust-sub:     #FAEAE4;\n  --neutral-200:  #E8E2D5;\n  --neutral-300:  #CFC8B8;\n  --neutral-500:  #7D7464;\n  --neutral-600:  #5C5448;\n  --neutral-800:  #27231B;\n  --gain:         #16A34A;\n  --loss:         #DC2626;\n  --sans:         'Open Sans', sans-serif;\n  --mono:         'Roboto Mono', monospace;\n}\n\n/* ── UTILITY BAR ────────────────────────────────────── */\n.util-bar {\n  background: var(--blue-dark);\n  height: 32px;\n  display: flex;\n  align-items: center;\n  justify-content: flex-end;\n  padding: 0 80px;\n  gap: 28px;\n  position: relative;\n  z-index: 200;\n}\n.util-bar a {\n  font-size: 11px;\n  letter-spacing: 0.08em;\n  color: rgba(255,255,255,0.55);\n  text-decoration: none;\n  text-transform: uppercase;\n  transition: color 150ms;\n}\n.util-bar a:hover { color: rgba(255,255,255,0.9); }\n\n/* ── GLOBAL NAV ─────────────────────────────────────── */\n#global-nav {\n  position: fixed;\n  top: 32px;\n  left: 0; right: 0;\n  height: 60px;\n  display: flex;\n  align-items: center;\n  padding: 0 80px;\n  gap: 0;\n  z-index: 199;\n  transition: background 250ms ease, box-shadow 250ms ease, border-bottom-color 250ms ease;\n  border-bottom: 1px solid transparent;\n}\n#global-nav.solid {\n  background: #fff;\n  box-shadow: 0 1px 16px rgba(0,72,117,0.08);\n  border-bottom-color: rgba(0,72,117,0.08);\n}\n#global-nav.solid .nav-link { color: var(--blue); }\n#global-nav.solid .nav-login {\n  color: var(--blue);\n  border-color: rgba(0,72,117,0.25);\n  background: transparent;\n}\n#global-nav.solid .nav-icon { stroke: var(--blue); }\n\n.nav-logo {\n  display: flex;\n  align-items: center;\n  gap: 10px;\n  margin-right: 52px;\n  flex-shrink: 0;\n  text-decoration: none;\n}\n.nav-logo-text {\n  font-size: 22px;\n  font-weight: 700;\n  color: #fff;\n  letter-spacing: -0.01em;\n  transition: color 250ms;\n}\n#global-nav.solid .nav-logo-text { color: var(--blue); }\n\n.nav-links { display: flex; gap: 0; flex: 1; }\n.nav-link {\n  font-size: 13.5px;\n  font-weight: 500;\n  color: rgba(255,255,255,0.85);\n  padding: 0 18px;\n  height: 60px;\n  display: flex;\n  align-items: center;\n  text-decoration: none;\n  letter-spacing: 0.005em;\n  transition: color 200ms;\n  position: relative;\n  white-space: nowrap;\n}\n.nav-link::after {\n  content: '';\n  position: absolute;\n  bottom: 0; left: 18px; right: 18px;\n  height: 2px;\n  background: var(--orange);\n  transform: scaleX(0);\n  transition: transform 200ms ease;\n}\n.nav-link:hover { color: #fff; }\n.nav-link:hover::after { transform: scaleX(1); }\n#global-nav.solid .nav-link:hover { color: var(--blue); }\n\n.nav-utils { display: flex; align-items: center; gap: 20px; }\n.nav-search-btn {\n  background: none; border: none; cursor: pointer; padding: 4px;\n  display: flex; align-items: center;\n}\n.nav-icon { stroke: rgba(255,255,255,0.75); transition: stroke 250ms; }\n.nav-login {\n  font-size: 13px;\n  font-weight: 600;\n  color: rgba(255,255,255,0.9);\n  border: 1px solid rgba(255,255,255,0.3);\n  padding: 7px 20px;\n  border-radius: 3px;\n  text-decoration: none;\n  letter-spacing: 0.02em;\n  transition: background 200ms, color 250ms, border-color 250ms;\n}\n.nav-login:hover { background: rgba(255,255,255,0.1); }\n#global-nav.solid .nav-login:hover { background: rgba(0,72,117,0.06); }\n\n/* L-grid logo mark SVG inline */\n.logo-mark { width: 30px; height: 30px; flex-shrink: 0; }\n\n/* ── HERO ────────────────────────────────────────────── */\n.hero {\n  background: linear-gradient(135deg, #003357 0%, #004875 45%, #0A6B8C 100%);\n  background-size: 300% 300%;\n  min-height: 100vh;\n  display: flex;\n  flex-direction: column;\n  position: relative;\n  overflow: hidden;\n  padding-top: 92px;\n  animation: gradientDrift 14s ease infinite;\n}\n@keyframes gradientDrift {\n  0%,100% { background-position: 0% 50%; }\n  33%      { background-position: 100% 30%; }\n  66%      { background-position: 50% 100%; }\n}\n\n/* Particle canvas */\n#hero-canvas {\n  position: absolute;\n  inset: 0;\n  z-index: 1;\n  pointer-events: none;\n  opacity: 0.9;\n}\n\n/* Graph-paper grid overlay */\n.hero::before {\n  content: '';\n  position: absolute;\n  inset: 0;\n  background-image: none;\n  background-size: unset;\n  background-position: 0 0;\n  pointer-events: none;\n  z-index: 0;\n}\n\n/* Subtle radial centre-right glow */\n.hero::after {\n  content: '';\n  position: absolute;\n  top: -10%;\n  right: 5%;\n  width: 60%;\n  height: 120%;\n  background: radial-gradient(ellipse at center, rgba(10,107,140,0.35) 0%, transparent 65%);\n  pointer-events: none;\n}\n\n.hero-inner {\n  flex: 1;\n  display: flex;\n  align-items: center;\n  padding: 40px 80px 40px;\n  gap: 0;\n  position: relative;\n  z-index: 2;\n  will-change: transform;\n}\n\n/* ── HERO LEFT ── */\n.hero-left {\n  flex: 0 0 56%;\n  padding-right: 72px;\n  border-right: 1px solid rgba(255,255,255,0.1);\n  display: flex;\n  flex-direction: column;\n  justify-content: center;\n  gap: 0;\n}\n\n.hero-eyebrow {\n  display: flex;\n  align-items: center;\n  gap: 12px;\n  margin-bottom: 28px;\n  opacity: 0;\n  transform: translateX(-18px);\n  transition: opacity 0.7s ease 0.1s, transform 0.7s ease 0.1s;\n}\n.hero-eyebrow.anim-in { opacity: 1; transform: translateX(0); }\n.hero-eyebrow-line {\n  width: 32px;\n  height: 1.5px;\n  background: var(--orange);\n}\n.hero-eyebrow-text {\n  font-size: 12px;\n  font-weight: 600;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--orange);\n}\n\n.hero-headline {\n  font-size: 56px;\n  font-weight: 600;\n  color: #fff;\n  line-height: 1.1;\n  letter-spacing: -0.025em;\n  margin-bottom: 24px;\n}\n.hero-headline em {\n  font-style: normal;\n  color: var(--orange);\n}\n\n.hero-sub {\n  font-size: 18px;\n  color: rgba(255,255,255,0.55);\n  line-height: 1.6;\n  max-width: 460px;\n  margin-bottom: 40px;\n  font-weight: 400;\n  opacity: 0;\n  transform: translateY(16px);\n  transition: opacity 0.7s ease, transform 0.7s ease;\n}\n.hero-sub.anim-in { opacity: 1; transform: translateY(0); }\n\n.hero-ctas {\n  display: flex;\n  gap: 16px;\n  align-items: center;\n  opacity: 0;\n  transform: translateY(12px);\n  transition: opacity 0.6s ease, transform 0.6s ease;\n}\n.hero-ctas.anim-in { opacity: 1; transform: translateY(0); }\n\n/* Word-by-word headline reveal */\n.hw {\n  display: inline-block;\n  opacity: 0;\n  transform: translateY(32px);\n  margin-right: 0.26em;\n  transition: opacity 0.65s cubic-bezier(0.16,1,0.3,1), transform 0.65s cubic-bezier(0.16,1,0.3,1);\n}\n.hw:last-child, em .hw { margin-right: 0; }\n.hw.in { opacity: 1; transform: translateY(0); }\n\n/* Chart line draw animation */\n.cline-emkay {\n  stroke-dasharray: 2000;\n  stroke-dashoffset: 2000;\n  animation: drawChart 1.8s cubic-bezier(0.16,1,0.3,1) 0.6s forwards;\n}\n.cline-bench {\n  stroke-dasharray: 2000;\n  stroke-dashoffset: 2000;\n  animation: drawChart 2.2s cubic-bezier(0.16,1,0.3,1) 0.9s forwards;\n}\n.carea-emkay {\n  opacity: 0;\n  animation: fadeInArea 0.8s ease 1.8s forwards;\n}\n.carea-bench {\n  opacity: 0;\n  animation: fadeInArea 0.8s ease 2s forwards;\n}\n@keyframes drawChart {\n  to { stroke-dashoffset: 0; }\n}\n@keyframes fadeInArea {\n  to { opacity: 1; }\n}\n\n/* Stat chip counter animation */\n.stat-chip {\n  opacity: 0;\n  transform: translateY(12px);\n  transition: opacity 0.5s ease, transform 0.5s ease, background 200ms, border-color 200ms;\n}\n.stat-chip.chip-in { opacity: 1; transform: translateY(0); }\n.stat-chip:hover {\n  background: rgba(255,255,255,0.13);\n  border-color: rgba(255,255,255,0.25);\n}\n.btn-primary {\n  background: var(--orange);\n  color: #fff;\n  padding: 14px 32px;\n  border-radius: 3px;\n  font-size: 14px;\n  font-weight: 700;\n  letter-spacing: 0.02em;\n  text-decoration: none;\n  transition: background 200ms, box-shadow 200ms;\n  border: none;\n  cursor: pointer;\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n}\n.btn-primary:hover { background: var(--orange-dark); box-shadow: 0 4px 16px rgba(239,138,0,0.35); }\n\n.btn-ghost {\n  color: rgba(255,255,255,0.7);\n  font-size: 14px;\n  font-weight: 500;\n  text-decoration: none;\n  letter-spacing: 0.01em;\n  transition: color 200ms;\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n  border-bottom: 1px solid transparent;\n  padding-bottom: 1px;\n}\n.btn-ghost:hover { color: #fff; border-bottom-color: rgba(255,255,255,0.5); }\n\n/* ── HERO RIGHT ── */\n.hero-right {\n  flex: 1;\n  padding-left: 64px;\n  display: flex;\n  flex-direction: column;\n  gap: 20px;\n  align-self: center;\n}\n\n/* Performance chart panel */\n.chart-panel {\n  background: rgba(0,20,40,0.5);\n  border: 1px solid rgba(255,255,255,0.1);\n  border-radius: 12px;\n  padding: 24px 24px 16px;\n  position: relative;\n  overflow: hidden;\n  backdrop-filter: blur(4px);\n}\n/* Inner centre glow */\n.chart-panel::before {\n  content: '';\n  position: absolute;\n  top: 30%;\n  left: 50%;\n  transform: translate(-50%, -50%);\n  width: 80%;\n  height: 60%;\n  background: radial-gradient(ellipse, rgba(10,107,140,0.25) 0%, transparent 70%);\n  pointer-events: none;\n}\n.chart-header {\n  display: flex;\n  justify-content: space-between;\n  align-items: center;\n  margin-bottom: 4px;\n  position: relative;\n  z-index: 2;\n}\n.chart-title {\n  font-size: 12px;\n  font-weight: 600;\n  color: rgba(255,255,255,0.55);\n  letter-spacing: 0.08em;\n  text-transform: uppercase;\n}\n.chart-legend {\n  display: flex;\n  gap: 16px;\n  align-items: center;\n}\n.legend-item {\n  display: flex;\n  align-items: center;\n  gap: 6px;\n  font-size: 11px;\n}\n.legend-dot {\n  width: 20px;\n  height: 2.5px;\n  border-radius: 2px;\n}\n.chart-svg-wrap {\n  position: relative;\n  z-index: 2;\n}\n.chart-caption {\n  font-size: 11px;\n  color: rgba(255,255,255,0.4);\n  line-height: 1.5;\n  margin-top: 10px;\n  position: relative;\n  z-index: 2;\n}\n.chart-disclaimer {\n  font-size: 10px;\n  color: rgba(255,255,255,0.22);\n  letter-spacing: 0.04em;\n  text-transform: uppercase;\n  margin-top: 6px;\n  position: relative;\n  z-index: 2;\n}\n\n/* Glass stat tiles */\n.stat-overlays {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 10px;\n  margin-top: 14px;\n}\n.stat-tile {\n  background: rgba(255,255,255,0.07);\n  border: 1px solid rgba(255,255,255,0.1);\n  border-radius: 6px;\n  padding: 14px 16px;\n  backdrop-filter: blur(8px);\n}\n.stat-tile-value {\n  font-family: var(--mono);\n  font-size: 22px;\n  font-weight: 500;\n  color: #fff;\n  line-height: 1;\n  margin-bottom: 4px;\n}\n.stat-tile-label {\n  font-size: 11px;\n  color: rgba(255,255,255,0.45);\n  letter-spacing: 0.03em;\n}\n.stat-chip {\n  background: rgba(255,255,255,0.08);\n  border: 1px solid rgba(255,255,255,0.15);\n  border-radius: 8px;\n  padding: 14px 18px;\n  display: flex;\n  flex-direction: column;\n  gap: 5px;\n  backdrop-filter: blur(12px);\n  -webkit-backdrop-filter: blur(12px);\n}\n.stat-chip-value {\n  font-family: 'Open Sans', sans-serif;\n  font-size: 28px;\n  font-weight: 600;\n  color: #fff;\n  letter-spacing: -0.02em;\n  line-height: 1;\n}\n.stat-chip-label {\n  font-size: 10px;\n  font-weight: 600;\n  color: var(--orange);\n  letter-spacing: 0.1em;\n  text-transform: uppercase;\n}\n\n/* Scroll indicator */\n.hero-scroll {\n  padding: 0 80px 40px;\n  display: flex;\n  align-items: center;\n  gap: 12px;\n  position: relative;\n  z-index: 2;\n}\n.scroll-line {\n  width: 24px;\n  height: 1px;\n  background: rgba(255,255,255,0.3);\n}\n.scroll-label {\n  font-size: 11px;\n  color: rgba(255,255,255,0.35);\n  letter-spacing: 0.1em;\n  text-transform: uppercase;\n}\n\n/* ── LIVE TICKER BAR ── */\n.ticker-bar {\n  background: var(--orange);\n  height: 44px;\n  display: flex;\n  align-items: center;\n  overflow: hidden;\n  position: relative;\n  z-index: 10;\n}\n.ticker-live {\n  display: flex;\n  align-items: center;\n  gap: 6px;\n  padding: 0 20px 0 24px;\n  flex-shrink: 0;\n  z-index: 2;\n  background: var(--orange);\n  border-right: 1px solid rgba(255,255,255,0.2);\n  height: 100%;\n}\n.ticker-dot {\n  width: 7px; height: 7px; border-radius: 50%;\n  background: #22C55E;\n  box-shadow: 0 0 6px #22C55E;\n  animation: tickerPulse 1.8s ease-in-out infinite;\n}\n@keyframes tickerPulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }\n.ticker-live-label {\n  font-size: 11px;\n  font-weight: 600;\n  letter-spacing: 0.12em;\n  color: #fff;\n  text-transform: uppercase;\n}\n.ticker-mask {\n  flex: 1;\n  overflow: hidden;\n  height: 100%;\n  display: flex;\n  align-items: center;\n  -webkit-mask-image: linear-gradient(to right, transparent 0%, black 3%, black 97%, transparent 100%);\n  mask-image: linear-gradient(to right, transparent 0%, black 3%, black 97%, transparent 100%);\n}\n.ticker-track {\n  display: flex;\n  white-space: nowrap;\n  animation: tickerScroll 40s linear infinite;\n}\n@keyframes tickerScroll {\n  0%   { transform: translateX(0); }\n  100% { transform: translateX(-50%); }\n}\n.ticker-content {\n  display: inline-flex;\n  align-items: center;\n  padding-right: 60px;\n  font-size: 13px;\n  line-height: 1;\n}\n.t-name  { font-weight: 600; color: #fff; margin-right: 6px; }\n.t-price { font-family: var(--mono); color: #fff; margin-right: 4px; }\n.t-up    { color: #1A3A1A; font-weight: 600; margin-right: 16px; }\n.t-dn    { color: #5A1A1A; font-weight: 600; margin-right: 16px; }\n.t-sep   { color: rgba(255,255,255,0.6); margin: 0 16px; }\n\n/* ── ORANGE STATS BAR ────────────────────────────────── */\n.stats-bar {\n  background: var(--orange);\n  padding: 0 80px;\n  display: flex;\n}\n.stats-bar-item {\n  flex: 1;\n  padding: 22px 0;\n  display: flex;\n  align-items: center;\n  gap: 14px;\n  border-right: 1px solid rgba(255,255,255,0.2);\n}\n.stats-bar-item:last-child { border-right: none; }\n.stats-bar-item:not(:first-child) { padding-left: 40px; }\n.stats-bar-value {\n  font-family: var(--mono);\n  font-size: 28px;\n  font-weight: 500;\n  color: #fff;\n  letter-spacing: -0.02em;\n  line-height: 1;\n}\n.stats-bar-label {\n  font-size: 12px;\n  color: rgba(255,255,255,0.72);\n  line-height: 1.4;\n}\n\n/* ── VERTICALS SECTION ───────────────────────────────── */\n.verticals-section {\n  padding: 72px 80px;\n  background: var(--cream);\n}\n.section-header {\n  display: flex;\n  justify-content: space-between;\n  align-items: flex-end;\n  margin-bottom: 40px;\n}\n.section-label {\n  font-size: 11px;\n  font-weight: 600;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--orange);\n  margin-bottom: 10px;\n}\n.section-title {\n  font-size: 36px;\n  font-weight: 600;\n  color: var(--blue);\n  letter-spacing: -0.02em;\n  line-height: 1.1;\n}\n.section-link {\n  font-size: 13px;\n  color: var(--neutral-500);\n  text-decoration: none;\n  letter-spacing: 0.02em;\n  align-self: flex-end;\n}\n.section-link:hover { color: var(--blue); }\n\n/* 2+1+1 grid */\n.verticals-grid {\n  display: grid;\n  grid-template-columns: 1fr 1fr 1fr;\n  grid-template-rows: auto;\n  gap: 2px;\n  background: var(--neutral-200);\n  border-radius: 8px;\n  overflow: hidden;\n}\n\n/* Capital Markets — spans 2 rows */\n.vert-card {\n  background: #fff;\n  padding: 40px;\n  display: flex;\n  flex-direction: column;\n  gap: 0;\n  cursor: pointer;\n  transition: background 200ms;\n  position: relative;\n  overflow: hidden;\n  text-decoration: none;\n}\n.vert-card:hover { background: #FAFAF7; }\n\n.vert-card-capital { grid-row: span 1; }\n.vert-card-capital:hover { background: #F5F8FC; }\n.vert-card-wealth:hover { background: #F8F7FC; }\n.vert-card-asset:hover { background: #FDF5F2; }\n\n/* Top accent line */\n.vert-accent {\n  position: absolute;\n  top: 0; left: 0; right: 0;\n  height: 3px;\n}\n\n.vert-tag {\n  font-size: 11px;\n  font-weight: 600;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  margin-bottom: 12px;\n}\n.vert-name {\n  font-size: 22px;\n  font-weight: 600;\n  line-height: 1.2;\n  letter-spacing: -0.01em;\n  margin-bottom: 12px;\n}\n.vert-desc {\n  font-size: 14px;\n  color: var(--neutral-600);\n  line-height: 1.6;\n  margin-bottom: 24px;\n}\n\n/* Image placeholder inside vertical card */\n.vert-img {\n  background: #E8E2D5;\n  border-radius: 4px;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  font-size: 12px;\n  color: #A89F8C;\n  letter-spacing: 0.04em;\n  margin-bottom: 24px;\n  flex: 0 0 auto;\n}\n\n.vert-products {\n  display: flex;\n  flex-wrap: wrap;\n  gap: 6px;\n  margin-bottom: 24px;\n}\n.vert-product-tag {\n  font-size: 11px;\n  padding: 3px 10px;\n  border-radius: 2px;\n  font-weight: 600;\n  letter-spacing: 0.04em;\n}\n.vert-cta {\n  font-size: 14px;\n  font-weight: 600;\n  text-decoration: none;\n  display: flex;\n  align-items: center;\n  gap: 6px;\n  margin-top: auto;\n  letter-spacing: 0.01em;\n  transition: gap 200ms;\n}\n.vert-cta:hover { gap: 10px; }\n\n/* Small card (wealth, asset) adjustments */\n.vert-card-sm .vert-name { font-size: 18px; }\n.vert-card-sm .vert-desc { font-size: 13px; margin-bottom: 16px; }\n.vert-card-sm .vert-img { height: 100px; }\n\n/* ── DATA PREVIEW STRIP ──────────────────────────────── */\n.data-strip {\n  background: var(--blue-dark);\n  padding: 36px 80px;\n  display: flex;\n  gap: 0;\n  align-items: stretch;\n  overflow: hidden;\n}\n.data-strip-label {\n  font-size: 11px;\n  font-weight: 600;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  color: rgba(255,255,255,0.4);\n  writing-mode: vertical-rl;\n  transform: rotate(180deg);\n  margin-right: 32px;\n  align-self: center;\n  flex-shrink: 0;\n}\n.data-strip-items {\n  display: flex;\n  gap: 0;\n  flex: 1;\n  border-left: 1px solid rgba(255,255,255,0.08);\n  padding-left: 32px;\n}\n.data-item {\n  flex: 1;\n  padding: 0 24px;\n  border-right: 1px solid rgba(255,255,255,0.08);\n  display: flex;\n  flex-direction: column;\n  gap: 6px;\n}\n.data-item:last-child { border-right: none; }\n.data-item-label {\n  font-size: 11px;\n  color: rgba(255,255,255,0.35);\n  letter-spacing: 0.08em;\n  text-transform: uppercase;\n}\n.data-item-value {\n  font-family: var(--mono);\n  font-size: 22px;\n  color: #fff;\n  font-weight: 500;\n  letter-spacing: -0.01em;\n}\n.data-item-change {\n  font-family: var(--mono);\n  font-size: 13px;\n  font-weight: 500;\n}\n.gain { color: #4ADE80; }\n.loss { color: #F87171; }\n\n/* Placeholder bar chart */\n.mini-chart {\n  display: flex;\n  align-items: flex-end;\n  gap: 3px;\n  height: 32px;\n  margin-top: 4px;\n}\n.mini-bar {\n  width: 6px;\n  border-radius: 1px;\n  opacity: 0.5;\n  transition: opacity 200ms;\n}\n.data-item:hover .mini-bar { opacity: 0.8; }\n\n/* ── THOUGHT LEADERSHIP ──────────────────────────────── */\n.tl-section {\n  background: #fff;\n  padding: 72px 80px;\n  border-top: 1px solid var(--neutral-200);\n}\n.tl-grid {\n  display: grid;\n  grid-template-columns: 2fr 1fr 1fr 1fr;\n  gap: 24px;\n  margin-top: 40px;\n}\n.tl-card {\n  display: flex;\n  flex-direction: column;\n  gap: 14px;\n  cursor: pointer;\n  text-decoration: none;\n  color: inherit;\n}\n.tl-img {\n  background: var(--neutral-200);\n  border-radius: 6px;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  font-size: 12px;\n  color: var(--neutral-500);\n  letter-spacing: 0.04em;\n  transition: background 200ms;\n}\n.tl-card:hover .tl-img { background: var(--neutral-300); }\n.tl-card-featured .tl-img { height: 200px; }\n.tl-card:not(.tl-card-featured) .tl-img { height: 120px; }\n.tl-tag {\n  font-size: 10px;\n  font-weight: 700;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  padding: 3px 10px;\n  border-radius: 2px;\n  display: inline-block;\n}\n.tl-title {\n  font-size: 16px;\n  font-weight: 600;\n  color: var(--blue);\n  line-height: 1.35;\n  letter-spacing: -0.005em;\n}\n.tl-card-featured .tl-title { font-size: 20px; }\n.tl-meta {\n  font-size: 12px;\n  color: var(--neutral-500);\n  letter-spacing: 0.02em;\n}\n\n/* ── RINGS TEASER 3D STAGE ── */\n.rt-ambient {\n  position: absolute;\n  width: 520px; height: 520px;\n  border-radius: 50%;\n  background: radial-gradient(circle, rgba(80,40,10,0.28) 0%, transparent 68%);\n  pointer-events: none;\n  top: 50%; left: 50%;\n  transform: translate(-50%, -50%);\n}\n.rt-stage-wrap {\n  perspective: 900px;\n  perspective-origin: 50% 42%;\n  position: relative;\n  width: 480px; height: 480px;\n  display: flex; align-items: center; justify-content: center;\n}\n.rt-stage {\n  width: 420px; height: 420px;\n  transform-style: preserve-3d;\n  position: relative;\n  transform: rotateX(55deg) rotateZ(-45deg);\n  animation: rtSlowRotate 120s linear infinite;\n  transform-origin: center center;\n}\n@keyframes rtSlowRotate {\n  0%   { transform: rotateX(55deg) rotateZ(-45deg); }\n  100% { transform: rotateX(55deg) rotateZ(315deg); }\n}\n.rt-ring {\n  position: absolute;\n  border-radius: 50%;\n  box-sizing: border-box;\n  transform-style: preserve-3d;\n  outline: 1px solid rgba(0,0,0,0.45);\n  outline-offset: -1px;\n  box-shadow: inset 0 3px 10px rgba(0,0,0,0.5), inset 0 -1px 4px rgba(255,255,255,0.04);\n}\n.rt-ring::before {\n  content: '';\n  position: absolute; top: 0; left: 0; right: 0; bottom: 0;\n  border-radius: 50%; border: inherit;\n  transform: translateZ(-14px);\n  filter: brightness(0.2) saturate(0.5);\n  opacity: 0.65;\n}\n.rt-ring-1::before, .rt-ring-2::before { display: none; }\n\n/* Scaled to ~78% of full 540px stage to fit 420px container */\n.rt-ring-1 { width:  44px; height:  44px; top: calc(50% -  22px); left: calc(50% -  22px); border: 22px solid #2A1508; --rz: 156px; }\n.rt-ring-2 { width:  97px; height:  97px; top: calc(50% -  48px); left: calc(50% -  48px); border: 27px solid #3D2010; --rz: 125px; }\n.rt-ring-3 { width: 159px; height: 159px; top: calc(50% -  79px); left: calc(50% -  79px); border: 31px solid #4F2E1A; --rz:  94px; }\n.rt-ring-4 { width: 231px; height: 231px; top: calc(50% - 115px); left: calc(50% - 115px); border: 36px solid #613E26; --rz:  62px; }\n.rt-ring-5 { width: 312px; height: 312px; top: calc(50% - 156px); left: calc(50% - 156px); border: 41px solid #735030; --rz:  31px; }\n.rt-ring-6 { width: 402px; height: 402px; top: calc(50% - 201px); left: calc(50% - 201px); border: 45px solid #866040; --rz:   0px; }\n\n.rt-ring-1, .rt-ring-2, .rt-ring-3, .rt-ring-4, .rt-ring-5, .rt-ring-6 {\n  transform: translateZ(var(--rz));\n  opacity: 1;\n  filter: blur(0px) brightness(1.05);\n}\n\n/* ── GROWTH RINGS TEASER ─────────────────────────────── */\n.rings-teaser {\n  background: #0A0A0E;\n  padding: 0 80px 0 0;\n  display: flex;\n  gap: 0;\n  align-items: center;\n  min-height: 380px;\n  overflow: hidden;\n  position: relative;\n}\n.rings-visual {\n  flex: 0 0 44%;\n  position: relative;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  height: 380px;\n  overflow: visible;\n}\n.rings-teaser-copy {\n  flex: 1;\n  min-width: 280px;\n  max-width: 520px;\n  padding: 48px 0;\n}\n.rings-teaser-label {\n  font-size: 11px;\n  font-weight: 600;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--orange);\n  margin-bottom: 12px;\n}\n.rings-teaser-title {\n  font-size: 40px;\n  font-weight: 600;\n  color: #fff;\n  letter-spacing: -0.02em;\n  line-height: 1.1;\n  margin-bottom: 16px;\n}\n.rings-teaser-body {\n  font-size: 16px;\n  color: rgba(255,255,255,0.6);\n  line-height: 1.7;\n  margin-bottom: 32px;\n}\n.btn-outline-white {\n  color: #fff;\n  border: 1.5px solid rgba(255,255,255,0.3);\n  padding: 12px 28px;\n  border-radius: 3px;\n  font-size: 14px;\n  font-weight: 600;\n  text-decoration: none;\n  letter-spacing: 0.02em;\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n  transition: border-color 200ms, background 200ms;\n}\n.btn-outline-white:hover { border-color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.06); }\n\n/* ── FOOTER ──────────────────────────────────────────── */\n.footer {\n  background: var(--neutral-800);\n  padding: 56px 80px 32px;\n  color: rgba(255,255,255,0.5);\n}\n.footer-top {\n  display: grid;\n  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;\n  gap: 48px;\n  padding-bottom: 48px;\n  border-bottom: 1px solid rgba(255,255,255,0.08);\n  margin-bottom: 32px;\n}\n.footer-brand { display: flex; flex-direction: column; gap: 16px; }\n.footer-brand-name {\n  font-size: 20px;\n  font-weight: 700;\n  color: #fff;\n}\n.footer-brand-tagline {\n  font-size: 12px;\n  letter-spacing: 0.08em;\n  text-transform: uppercase;\n  color: var(--orange);\n}\n.footer-brand-desc {\n  font-size: 13px;\n  line-height: 1.6;\n  color: rgba(255,255,255,0.4);\n  max-width: 260px;\n}\n.footer-col-title {\n  font-size: 12px;\n  font-weight: 700;\n  letter-spacing: 0.1em;\n  text-transform: uppercase;\n  color: rgba(255,255,255,0.7);\n  margin-bottom: 16px;\n}\n.footer-link {\n  font-size: 13px;\n  color: rgba(255,255,255,0.4);\n  text-decoration: none;\n  display: block;\n  margin-bottom: 8px;\n  transition: color 150ms;\n}\n.footer-link:hover { color: rgba(255,255,255,0.8); }\n.footer-bottom {\n  display: flex;\n  justify-content: space-between;\n  align-items: center;\n  font-size: 12px;\n  color: rgba(255,255,255,0.25);\n}\n.footer-disclaimer {\n  font-size: 11px;\n  color: rgba(255,255,255,0.2);\n  line-height: 1.5;\n  max-width: 600px;\n  margin-top: 8px;\n}\n\n/* ══════════════════════════════════════════════════════\n   HI-FI POLISH — Animations, hover states, depth\n   ══════════════════════════════════════════════════════ */\n\n/* Entrance animation utility */\n.sa {\n  opacity: 0;\n  transform: translateY(22px);\n  transition: opacity 0.75s cubic-bezier(0.16,1,0.3,1),\n              transform 0.75s cubic-bezier(0.16,1,0.3,1);\n}\n.sa.in { opacity: 1; transform: translateY(0); }\n.sa-d1 { transition-delay:  80ms; }\n.sa-d2 { transition-delay: 160ms; }\n.sa-d3 { transition-delay: 240ms; }\n.sa-d4 { transition-delay: 320ms; }\n.sa-d5 { transition-delay: 400ms; }\n\n/* Section label gets a leading line */\n.section-label {\n  display: flex; align-items: center; gap: 10px;\n}\n.section-label::before {\n  content: '';\n  width: 22px; height: 1.5px;\n  background: var(--orange);\n  flex-shrink: 0;\n}\n\n/* Stats bar live indicator */\n.stats-live {\n  display: flex; align-items: center; gap: 7px;\n  padding: 4px 12px; border-radius: 2px;\n  background: rgba(255,255,255,0.12);\n  margin-right: 32px; flex-shrink: 0;\n}\n.stats-live-dot {\n  width: 6px; height: 6px; border-radius: 50%;\n  background: #fff;\n  animation: livePulse 2.2s ease-in-out infinite;\n}\n.stats-live-text { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.85); letter-spacing: 0.12em; }\n@keyframes livePulse {\n  0%,100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.45); }\n  50%      { box-shadow: 0 0 0 5px rgba(255,255,255,0); }\n}\n\n/* Vertical card elevation hover */\n.vert-card {\n  transition: transform 0.32s cubic-bezier(0.16,1,0.3,1), box-shadow 0.32s ease, background 200ms;\n  position: relative;\n}\n.vert-card-capital:hover { transform: translateY(-4px); box-shadow: 0 20px 48px rgba(0,72,117,0.13); z-index: 2; }\n.vert-card-wealth:hover  { transform: translateY(-4px); box-shadow: 0 20px 48px rgba(46,37,113,0.13); z-index: 2; }\n.vert-card-asset:hover   { transform: translateY(-4px); box-shadow: 0 20px 48px rgba(184,74,28,0.13); z-index: 2; }\n\n/* Vertical image area */\n.vert-img { border-radius: 6px; overflow: hidden; position: relative; }\n.vert-img svg { transition: transform 0.55s cubic-bezier(0.16,1,0.3,1); }\n.vert-card:hover .vert-img svg { transform: scale(1.05); }\n\n/* Product tags → pills */\n.vert-product-tag { border-radius: 100px; transition: background 150ms, color 150ms; }\n\n/* Data strip live badge */\n.data-live-badge {\n  display: inline-flex; align-items: center; gap: 5px;\n  padding: 2px 8px; border-radius: 2px;\n  background: rgba(74,222,128,0.1);\n  border: 1px solid rgba(74,222,128,0.2);\n  margin-bottom: 8px;\n}\n.data-live-dot {\n  width: 5px; height: 5px; border-radius: 50%;\n  background: #4ADE80;\n  animation: dotBlink 1.6s ease-in-out infinite;\n}\n@keyframes dotBlink { 0%,100% { opacity:1; } 50% { opacity:0.25; } }\n.data-live-text { font-size: 9px; font-weight: 700; color: #4ADE80; letter-spacing: 0.12em; }\n\n/* TL card hover */\n.tl-card { border-radius: 10px; overflow: hidden; transition: transform 0.3s cubic-bezier(0.16,1,0.3,1), box-shadow 0.3s ease; }\n.tl-card:hover { transform: translateY(-5px); box-shadow: 0 16px 40px rgba(0,72,117,0.1); }\n.tl-img { overflow: hidden; border-radius: 8px; }\n.tl-img-inner { width:100%; height:100%; transition: transform 0.55s cubic-bezier(0.16,1,0.3,1); }\n.tl-card:hover .tl-img-inner { transform: scale(1.05); }\n\n/* Rings teaser SVG animation */\n.rings-anim-svg circle {\n  animation: ringPulse 5s ease-in-out infinite;\n}\n.rings-anim-svg circle:nth-child(1) { animation-delay: 0s; }\n.rings-anim-svg circle:nth-child(2) { animation-delay: 0.7s; }\n.rings-anim-svg circle:nth-child(3) { animation-delay: 1.4s; }\n.rings-anim-svg circle:nth-child(4) { animation-delay: 2.1s; }\n.rings-anim-svg circle:nth-child(5) { animation-delay: 2.8s; }\n.rings-anim-svg circle:nth-child(6) { animation-delay: 3.5s; }\n@keyframes ringPulse { 0%,100% { opacity:0.3; } 50% { opacity:0.8; } }\n\n/* ── TWEAKS PANEL ────────────────────────────────────── */\n.tweaks-panel {\n  display: none;\n  position: fixed;\n  bottom: 24px;\n  right: 24px;\n  background: #fff;\n  border-radius: 10px;\n  box-shadow: 0 8px 32px rgba(0,0,0,0.18);\n  padding: 20px;\n  width: 260px;\n  z-index: 9999;\n  border: 1px solid var(--neutral-200);\n}\n.tweaks-title {\n  font-size: 13px;\n  font-weight: 700;\n  color: var(--blue);\n  margin-bottom: 16px;\n  letter-spacing: 0.04em;\n  text-transform: uppercase;\n}\n.tweak-row {\n  display: flex;\n  justify-content: space-between;\n  align-items: center;\n  margin-bottom: 14px;\n  gap: 12px;\n}\n.tweak-label {\n  font-size: 12px;\n  color: var(--neutral-600);\n  flex: 1;\n}\n.tweak-toggle {\n  width: 36px;\n  height: 20px;\n  background: var(--neutral-300);\n  border-radius: 10px;\n  cursor: pointer;\n  position: relative;\n  flex-shrink: 0;\n  transition: background 200ms;\n}\n.tweak-toggle.on { background: var(--blue); }\n.tweak-toggle::after {\n  content: '';\n  position: absolute;\n  top: 3px; left: 3px;\n  width: 14px; height: 14px;\n  background: #fff;\n  border-radius: 50%;\n  transition: transform 200ms;\n}\n.tweak-toggle.on::after { transform: translateX(16px); }\n.tweak-select {\n  font-size: 12px;\n  border: 1px solid var(--neutral-200);\n  border-radius: 4px;\n  padding: 4px 8px;\n  color: var(--blue);\n  background: #fff;\n  cursor: pointer;\n}\n\n/* ── UNIVERSAL SEARCH ────────────────────────────────── */\n.hero-search {\n  margin-top: 36px;\n  max-width: 520px;\n  opacity: 0; transform: translateY(10px);\n  transition: opacity 0.6s ease, transform 0.6s ease;\n}\n.hero-search.anim-in { opacity: 1; transform: translateY(0); }\n\n.hs-bar {\n  display: flex; align-items: center; gap: 12px;\n  background: rgba(255,255,255,0.08);\n  border: 1px solid rgba(255,255,255,0.18);\n  border-radius: 6px; padding: 0 16px; height: 48px;\n  transition: border-color 200ms, background 200ms;\n}\n.hs-bar:focus-within {\n  border-color: rgba(255,255,255,0.45);\n  background: rgba(255,255,255,0.12);\n}\n.hs-icon { flex-shrink: 0; }\n.hs-input {\n  flex: 1; background: none; border: none; outline: none;\n  font-size: 15px; font-weight: 400; color: #fff;\n  font-family: 'Open Sans', sans-serif;\n}\n.hs-input::placeholder { color: rgba(255,255,255,0.38); }\n.hs-shortcut {\n  font-size: 11px; color: rgba(255,255,255,0.25);\n  letter-spacing: 0.04em; flex-shrink: 0;\n}\n\n.hs-tags {\n  display: flex; align-items: center; gap: 8px;\n  margin-top: 14px; flex-wrap: wrap;\n}\n.hs-tag-label {\n  font-size: 11px; color: rgba(255,255,255,0.3);\n  letter-spacing: 0.06em; flex-shrink: 0;\n}\n.hs-tag {\n  font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.55);\n  background: rgba(255,255,255,0.07);\n  border: 1px solid rgba(255,255,255,0.12);\n  padding: 4px 10px; border-radius: 4px;\n  text-decoration: none; letter-spacing: 0.02em;\n  transition: background 200ms, color 200ms, border-color 200ms;\n  cursor: pointer;\n}\n.hs-tag:hover { background: rgba(239,138,0,0.15); color: var(--orange); border-color: rgba(239,138,0,0.35); }\n\n.hs-results {\n  background: rgba(0,20,35,0.92);\n  border: 1px solid rgba(255,255,255,0.12);\n  border-radius: 6px; margin-top: 8px;\n  backdrop-filter: blur(16px); overflow: hidden;\n  max-height: 0; transition: max-height 0.3s ease;\n}\n.hs-results.open { max-height: 320px; }\n.hs-result-group { padding: 12px 16px 8px; }\n.hs-result-group-label {\n  font-size: 10px; font-weight: 500; color: var(--orange);\n  letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 8px;\n}\n.hs-result-item {\n  display: flex; align-items: center; gap: 10px;\n  padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.06);\n  cursor: pointer; text-decoration: none;\n}\n.hs-result-item:last-child { border-bottom: none; }\n.hs-result-item:hover .hs-result-title { color: var(--orange); }\n.hs-result-type {\n  font-size: 9px; font-weight: 500; color: var(--orange);\n  letter-spacing: 0.16em; text-transform: uppercase;\n  background: rgba(239,138,0,0.12); padding: 2px 7px; bord ngs')\"><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"tweak-row\">\n    <span class=\"tweak-label\">Hero style<\u002Fspan>\n    <select class=\"tweak-select\" onchange=\"setHeroBg(this.value)\">\n      <option value=\"navy\">Deep navy (V3)<\u002Foption>\n      <option value=\"blue\">Emkay blue<\u002Foption>\n      <option value=\"dark\">Near-black<\u002Foption>\n    <\u002Fselect>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n/* =====================================================\n   HERO ANIMATIONS — Particles · Word reveal · Parallax\n   ===================================================== */\n\n(function() {\n\n/* ── 1. PARTICLE SYSTEM ── */\nconst canvas = document.getElementById('hero-canvas');\nconst hero   = document.querySelector('.hero');\nif (!canvas || !hero) return;\nconst ctx = canvas.getContext('2d');\n\nfunction resize() {\n  canvas.width  = hero.offsetWidth;\n  canvas.height = hero.offsetHeight;\n}\nresize();\nwindow.addEventListener('resize', resize, { passive: true });\n\nconst PARTICLE_COUNT = 72;\nconst CONNECT_DIST   = 130;\nconst MOUSE_REPEL    = 120;\n\nconst mouse = { x: -9999, y: -9999 };\nhero.addEventListener('mousemove', e => {\n  const r = hero.getBoundingClientRect();\n  mouse.x = e.clientX - r.left;\n  mouse.y = e.clientY - r.top;\n}, { passive: true });\nhero.addEventListener('mouseleave', () => { mouse.x = -9999; mouse.y = -9999; });\n\nfunction rand(a, b) { return a + Math.random() * (b - a); }\n\nconst particles = Array.from({ length: PARTICLE_COUNT }, () => ({\n  x: rand(0, canvas.width),\n  y: rand(0, canvas.height),\n  vx: rand(-0.28, 0.28),\n  vy: rand(-0.22, 0.22),\n  r:  rand(1.2, 2.8),\n  // mix orange and white/blue particles\n  type: Math.random() < 0.22 ? 'orange' : 'white',\n  alpha: rand(0.08, 0.32),\n}));\n\n/* ── PERSPECTIVE FLOOR — square cells via geometric row spacing ── */\n// rowT(r) = k^r where k = 1 - CELL/H ensures cell width == cell height at every depth.\n\nconst CELL    = 58;\nconst PF_VPY  = 0.36;   // horizon higher — more floor visible\nconst PF_NEAR = 1.0;    // grid bottom exactly at canvas bottom\nconst PF_ROWS = 55;     // many rows — fades into infinity\nconst PF_COLS = 18;     // covers full canvas width at near edge\n\nfunction getK() {\n  const H = canvas.height * (PF_NEAR - PF_VPY);\n  return Math.max(0.72, 1 - CELL / H);\n}\nfunction rowT(row) { return Math.pow(getK(), row); }\n\nfunction pfXY(col, row) {\n  const w = canvas.width, h = canvas.height;\n  const vpx = w * 0.5;\n  const vpy = h * PF_VPY;\n  const nearY = h * PF_NEAR;\n  const nLines = Math.ceil(w / CELL) + 1;\n  const nearX = (col / nLines) * w;\n  const t = rowT(row);\n  return { x: vpx + (nearX - vpx) * t, y: vpy + (nearY - vpy) * t };\n}\n\nfunction drawIsoGrid() {\n  const w = canvas.width, h = canvas.height;\n  const vpx = w * 0.5;\n  const vpy = h * PF_VPY;\n  const nearY = h * PF_NEAR;\n  ctx.save();\n  ctx.lineWidth = 0.8;\n\n  // Horizontal rows — span edge-to-edge at near, narrow toward VP with depth\n  for (let row = 0; row <= PF_ROWS; row++) {\n    const t = rowT(row);\n    if (t < 0.004) break; // invisible — stop drawing\n    const alpha = 0.04 + 0.09 * t;\n    ctx.strokeStyle = `rgba(255,255,255,${alpha.toFixed(3)})`;\n    // Left and right x follow the canvas-corner boundary lines at this depth\n    const xl = vpx - (vpx) * t;           // 0 at t=1 (near), vpx at t=0 (far)\n    const xr = vpx + (w - vpx) * t;       // w at t=1, vpx at t=0\n    const y  = vpy + (nearY - vpy) * t;\n    ctx.beginPath();\n    ctx.moveTo(xl, y);\n    ctx.lineTo(xr, y);\n    ctx.stroke();\n  }\n\n  // Depth lines: uniformly spaced across full canvas width at near edge, all converge to VP\n  const nLines = Math.ceil(w / CELL) + 1;\n  ctx.strokeStyle = 'rgba(255,255,255,0.09)';\n  for (let i = 0; i <= nLines; i++) {\n    const nearX = (i / nLines) * w;\n    ctx.beginPath();\n    ctx.moveTo(nearX, nearY);\n    ctx.lineTo(vpx, vpy);\n    ctx.stroke();\n  }\n  ctx.restore();\n}\n\n/* ── VIGNETTE — horizon + side fades ── */\nfunction drawVignette() {\n  const w = canvas.width, h = canvas.height;\n  const vpy = h * PF_VPY;\n  // Strong horizon fade — grid dissolves into infinity\n  const topG = ctx.createLinearGradient(0, 0, 0, vpy * 2.2);\n  topG.addColorStop(0,    'rgba(0,22,40,0.98)');\n  topG.addColorStop(0.45, 'rgba(0,22,40,0.7)');\n  topG.addColorStop(1,    'rgba(0,22,40,0)');\n  ctx.fillStyle = topG; ctx.fillRect(0, 0, w, vpy * 2.2);\n  // Soft side fades\n  const lG = ctx.createLinearGradient(0, 0, w * 0.08, 0);\n  lG.addColorStop(0, 'rgba(0,22,40,0.6)');\n  lG.addColorStop(1, 'rgba(0,22,40,0)');\n  ctx.fillStyle = lG; ctx.fillRect(0, 0, w * 0.08, h);\n  const rG = ctx.createLinearGradient(w, 0, w * 0.92, 0);\n  rG.addColorStop(0, 'rgba(0,22,40,0.6)');\n  rG.addColorStop(1, 'rgba(0,22,40,0)');\n  ctx.fillStyle = rG; ctx.fillRect(w * 0.92, 0, w * 0.08, h);\n}\n\n/* ── KNIGHT BLOCK SYSTEM ── */\nconst KB_MOVES = [[2,1],[2,-1],[-2,1],[-2,-1],[1,2],[1,-2],[-1,2],[-1,-2]];\nconst KB_JUMP  = 96;\nconst KB_HIST  = 5;\n\nfunction inGrid(col, row) {\n  const nLines = Math.ceil(canvas.width / CELL) + 1;\n  return col >= 0 && col <= nLines && row >= 0 && row < PF_ROWS - 2;\n}\n\nfunction easeIO(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }\n\nfunction drawCell(cx, col, row, alpha, blur) {\n  const tl = pfXY(col,   row+1);\n  const tr = pfXY(col+1, row+1);\n  const br = pfXY(col+1, row);\n  const bl = pfXY(col,   row);\n  cx.save();\n  cx.shadowColor = 'rgba(239,138,0,0.65)';\n  cx.shadowBlur  = blur;\n  cx.fillStyle   = `rgba(239,138,0,${alpha.toFixed(3)})`;\n  cx.beginPath();\n  cx.moveTo(tl.x, tl.y); cx.lineTo(tr.x, tr.y);\n  cx.lineTo(br.x, br.y); cx.lineTo(bl.x, bl.y);\n  cx.closePath(); cx.fill(); cx.restore();\n}\n\nfunction makeKnightBlock() {\n  const nL = Math.ceil(canvas.width / CELL) + 1;\n  let col = Math.floor(Math.random() * nL);\n  let row = Math.floor(Math.random() * (PF_ROWS - 2));\n  if (!inGrid(col, row)) { col = Math.floor(nL / 2); row = Math.floor(PF_ROWS / 2); }\n\n  let srcCol = col, srcRow = row;\n  let dstCol = col, dstRow = row;\n  let elCol  = col, elRow  = row;  // elbow of the L\n  let frame  = KB_JUMP; // start ready to move immediately\n  const trail = []; // past resting positions\n\n  function startMove() {\n    const moves = KB_MOVES.slice().sort(() => Math.random() - 0.5);\n    for (const [dc, dr] of moves) {\n      if (inGrid(col + dc, row + dr)) {\n        trail.push({ col, row, age: 0 });\n        srcCol = col; srcRow = row;\n        dstCol = col + dc; dstRow = row + dr;\n        // Elbow: randomly pick which leg goes first\n        if (Math.random() < 0.5) {\n          elCol = col + dc; elRow = row;      // horizontal first\n        } else {\n          elCol = col;      elRow = row + dr; // vertical first\n        }\n        frame = 0; return true;\n      }\n    }\n    return false;\n  }\n\n  return {\n    update() {\n      trail.forEach(h => h.age++);\n      while (trail.length > KB_HIST) trail.shift();\n      frame++;\n      if (frame >= KB_JUMP) {\n        col = dstCol; row = dstRow;\n        if (!startMove()) {\n          col = Math.floor((Math.ceil(canvas.width / CELL) + 1) / 2); row = Math.floor(PF_ROWS / 2);\n          trail.length = 0;\n          srcCol = dstCol = elCol = col;\n          srcRow = dstRow = elRow = row;\n          frame = KB_JUMP;\n        }\n      }\n    },\n    draw(cx) {\n      // Fading trail — previous resting cells\n      trail.forEach(h => {\n        const fade = Math.max(0, 1 - h.age / (KB_JUMP * KB_HIST));\n        if (fade < 0.01) return;\n        drawCell(cx, h.col, h.row, fade * 0.22, 5);\n      });\n\n      // Animated block travelling the L-shape\n      const raw = Math.min(frame / KB_JUMP, 1);\n      const p   = easeIO(raw); // 0→1 over full move\n      let aC, aR;\n      if (p < 0.5) {\n        // First leg: src → elbow\n        const t = p / 0.5;\n        aC = srcCol + (elCol - srcCol) * t;\n        aR = srcRow + (elRow - srcRow) * t;\n      } else {\n        // Second leg: elbow → dst\n        const t = (p - 0.5) / 0.5;\n        aC = elCol + (dstCol - elCol) * t;\n        aR = elRow + (dstRow - elRow) * t;\n      }\n      drawCell(cx, aC, aR, 0.78, 22);\n    }\n  };\n}\n\nconst knightBlocks = Array.from({ length: 4 }, makeKnightBlock);\nfunction drawKnightBlocks() {\n  knightBlocks.forEach(b => { b.update(); b.draw(ctx); });\n}\n\n/* ── 3. PARTICLE + TRAIL DRAW LOOP ── */\nfunction drawParticles() {\n  ctx.clearRect(0, 0, canvas.width, canvas.height);\n  drawIsoGrid();\n  drawVignette();\n  drawKnightBlocks();\n\n  // Update positions\n  particles.forEach(p => {\n    // Mouse repulsion\n    const dx = p.x - mouse.x, dy = p.y - mouse.y;\n    const dist = Math.sqrt(dx*dx + dy*dy);\n    if (dist < MOUSE_REPEL) {\n      const force = (MOUSE_REPEL - dist) / MOUSE_REPEL;\n      p.vx += (dx / dist) * force * 0.4;\n      p.vy += (dy / dist) * force * 0.4;\n    }\n    // Damping\n    p.vx *= 0.985;\n    p.vy *= 0.985;\n    // Move\n    p.x += p.vx;\n    p.y += p.vy;\n    // Wrap edges\n    if (p.x < 0) p.x = canvas.width;\n    if (p.x > canvas.width) p.x = 0;\n    if (p.y < 0) p.y = canvas.height;\n    if (p.y > canvas.height) p.y = 0;\n  });\n\n  // Draw connection lines\n  for (let i = 0; i < particles.length; i++) {\n    for (let j = i + 1; j < particles.length; j++) {\n      const a = particles[i], b = particles[j];\n      const dx = a.x - b.x, dy = a.y - b.y;\n      const dist = Math.sqrt(dx*dx + dy*dy);\n      if (dist < CONNECT_DIST) {\n        const alpha = (1 - dist / CONNECT_DIST) * 0.07;\n        ctx.beginPath();\n        ctx.moveTo(a.x, a.y);\n        ctx.lineTo(b.x, b.y);\n        ctx.strokeStyle = `rgba(255,255,255,${alpha})`;\n        ctx.lineWidth = 0.6;\n        ctx.stroke();\n      }\n    }\n  }\n\n  // Draw dots\n  particles.forEach(p => {\n    ctx.beginPath();\n    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);\n    if (p.type === 'orange') {\n      ctx.fillStyle = `rgba(239,138,0,${p.alpha})`;\n    } else {\n      ctx.fillStyle = `rgba(255,255,255,${p.alpha * 0.7})`;\n    }\n    ctx.fill();\n  });\n\n  requestAnimationFrame(drawParticles);\n}\nrequestAnimationFrame(drawParticles);\n\n/* ── 2. WORD-BY-WORD HEADLINE REVEAL ── */\nfunction revealHeadline() {\n  const h1 = document.querySelector('.hero-headline');\n  if (!h1) return;\n  h1.innerHTML = '';\n\n  const lines = [\n    ['Your', 'success', 'is'],\n    ['our', { em: 'success.' }]\n  ];\n\n  let delay = 80;\n  const words = [];\n\n  lines.forEach((line, li) => {\n    line.forEach((word, wi) => {\n      const isEm = typeof word === 'object' && word.em;\n      const text = isEm ? word.em : word;\n\n      const span = document.createElement('span');\n      span.className = 'hw';\n      span.textContent = text;\n      span.style.transitionDelay = delay + 'ms';\n      delay += 68;\n      words.push(span);\n\n      if (isEm) {\n        const em = document.createElement('em');\n        em.appendChild(span);\n        h1.appendChild(em);\n      } else {\n        h1.appendChild(span);\n      }\n\n      // Space between words (but not before em which gets margin from .hw)\n      if (wi < line.length - 1) {\n        h1.appendChild(document.createTextNode(' '));\n      }\n    });\n    if (li < lines.length - 1) h1.appendChild(document.createElement('br'));\n  });\n\n  // Trigger\n  requestAnimationFrame(() => requestAnimationFrame(() => {\n    words.forEach(w => w.classList.add('in'));\n  }));\n\n  // After headline, fade in sub and CTAs\n  const totalDelay = delay + 120;\n  setTimeout(() => {\n    const sub = document.querySelector('.hero-sub');\n    const ctas = document.querySelector('.hero-ctas');\n    if (sub)  sub.classList.add('anim-in');\n    if (ctas) { setTimeout(() => ctas.classList.add('anim-in'), 140); }\n  }, totalDelay);\n}\n\n/* ── 3. EYEBROW REVEAL ── */\nfunction revealEyebrow() {\n  const ey = document.querySelector('.hero-eyebrow');\n  if (ey) setTimeout(() => ey.classList.add('anim-in'), 60);\n}\n\n/* ── 4. STAT CHIP STAGGER ── */\nfunction revealStatChips() {\n  document.querySelectorAll('.stat-chip').forEach((chip, i) => {\n    setTimeout(() => chip.classList.add('chip-in'), 900 + i * 110);\n  });\n}\n\n/* ── 5. SCROLL PARALLAX ── */\nfunction onHeroScroll() {\n  const y = window.scrollY;\n  const heroH = hero.offsetHeight;\n  if (y > heroH) return;\n  const t = y / heroH;\n\n  const inner = document.querySelector('.hero-inner');\n  if (inner) {\n    inner.style.transform = `translateY(${y * 0.18}px)`;\n    inner.style.opacity   = String(Math.max(0, 1 - t * 1.8));\n  }\n}\nwindow.addEventListener('scroll', onHeroScroll, { passive: true });\n\n/* ── INIT ── */\ndocument.addEventListener('DOMContentLoaded', () => {\n  revealEyebrow();\n  revealHeadline();\n  revealStatChips();\n});\n\n})();\n\n// ── SECTION ENTRANCE ANIMATIONS ──\nconst sectionObserver = new IntersectionObserver((entries) => {\n  entries.forEach(entry => {\n    if (entry.isIntersecting) {\n      entry.target.classList.add('in');\n    }\n  });\n}, { threshold: 0.08 });\ndocument.querySelectorAll('.sa').forEach(el => sectionObserver.observe(el));\n\n/* ── GROWTH RINGS TEASER 3D ── */\n(function() {\n  // Make all rings visible immediately (no scroll reveal needed)\n  document.querySelectorAll('.rt-ring').forEach(r => {\n    r.style.opacity = '1';\n    r.style.filter  = 'blur(0px) brightness(1.1)';\n    r.style.transform = 'translateZ(var(--rz))';\n  });\n})();\n\n(function() {\n  const stocks = [\n    { name:'RELIANCE',   price:'2,847.30', dir:1,  pct:'1.2%'  },\n    { name:'HDFC BANK',  price:'1,623.45', dir:-1, pct:'0.3%'  },\n    { name:'INFY',       price:'1,891.20', dir:1,  pct:'0.8%'  },\n    { name:'TCS',        price:'3,654.10', dir:1,  pct:'0.5%'  },\n    { name:'ICICI BANK', price:'1,124.55', dir:1,  pct:'1.8%'  },\n    { name:'BAJFINANCE', price:'6,832.40', dir:-1, pct:'0.4%'  },\n    { name:'AXISBANK',   price:'1,089.20', dir:1,  pct:'0.6%'  },\n    { name:'WIPRO',      price:'456.75',   dir:-1, pct:'0.2%'  },\n    { name:'MARUTI',     price:'12,340.50',dir:1,  pct:'0.9%'  },\n    { name:'LTIM',       price:'5,234.80', dir:1,  pct:'1.1%'  },\n    { name:'SBIN',       price:'812.30',   dir:1,  pct:'0.7%'  },\n    { name:'ITC',        price:'445.20',   dir:1,  pct:'0.4%'  },\n    { name:'LT',         price:'3,621.15', dir:1,  pct:'1.3%'  },\n    { name:'KOTAKBANK',  price:'1,742.60', dir:-1, pct:'0.2%'  },\n    { name:'ASIANPAINT', price:'2,845.30', dir:-1, pct:'0.5%'  },\n  ];\n\n  function buildHTML() {\n    return stocks.map((s, i) => {\n      const arrow = s.dir > 0 ? '▲' : '▼';\n      const cls   = s.dir > 0 ? 't-up' : 't-dn';\n      const sep   = i < stocks.length - 1 ? '<span class=\"t-sep\">·<\u002Fspan>' : '';\n      return `<span class=\"t-name\">${s.name}<\u002Fspan><span class=\"t-price\">${s.price}<\u002Fspan><span class=\"${cls}\">${arrow}${s.pct}<\u002Fspan>${sep}`;\n    }).join('');\n  }\n\n  const inner = buildHTML();\n  const a = document.getElementById('ticker-a');\n  const b = document.getElementById('ticker-b');\n  if (a) a.innerHTML = inner;\n  if (b) b.innerHTML = inner;\n})();\n\n// Add sa classes dynamically to key section elements\ndocument.addEventListener('DOMContentLoaded', () => {\n  // Stats bar items\n  document.querySelectorAll('.stats-bar-item').forEach((el, i) => {\n    el.classList.add('sa', `sa-d${i+1}`);\n    sectionObserver.observe(el);\n  });\n  // Vertical cards\n  document.querySelectorAll('.vert-card').forEach((el, i) => {\n    el.classList.add('sa', `sa-d${i}`);\n    sectionObserver.observe(el);\n  });\n  // Section headers\n  document.querySelectorAll('.section-header').forEach(el => {\n    if (!el.classList.contains('sa')) { el.classList.add('sa'); sectionObserver.observe(el); }\n  });\n  // Data strip items\n  document.querySelectorAll('.data-item').forEach((el, i) => {\n    el.classList.add('sa', `sa-d${i+1}`);\n    sectionObserver.observe(el);\n  });\n  // Footer cols\n  document.querySelectorAll('.footer-top > div').forEach((el, i) => {\n    el.classList.add('sa', `sa-d${i}`);\n    sectionObserver.observe(el);\n  });\n});\n\n// ── SEARCH OVERLAY ──\nconst overlay    = document.getElementById('search-overlay');\nconst solInput   = document.getElementById('sol-input');\nconst solResults = document.getElementById('sol-results');\nconst navSearchBtn = document.getElementById('nav-search-open');\n\nconst SEARCH_DATA = [\n  { type:'Research',   title:'NIM compression bottoming out; banking sector upgrade',        meta:'Seshadri Sen · BFSI',    tags:['BFSI','Valuations'] },\n  { type:'Research',   title:'EV transition timeline: 3 OEMs positioned for the shift',      meta:'Research Team · AUTO',   tags:['EV','AUTO'] },\n  { type:'Research',   title:'Premiumisation thesis intact despite rural slowdown',           meta:'Research Team · Consumer',tags:['Consumption'] },\n  { type:'Research',   title:'IT services demand commentary from Q2 results',                meta:'Research Team · Tech',   tags:['Technology'] },\n  { type:'Research',   title:'Capacity addition cycle and pricing power post-monsoon',        meta:'Research Team · Cement', tags:['Cement'] },\n  { type:'Insights',   title:'What the Fed pause means for Indian equity flows',              meta:'Macro Commentary',       tags:['Macro','FII-Flows'] },\n  { type:'Insights',   title:'The infrastructure super-cycle: Which sectors benefit?',        meta:'Sector Perspective',     tags:['Macro'] },\n  { type:'Insights',   title:'Reading between the lines of RBI policy statement',            meta:'Monetary Policy',        tags:['RBI','Macro'] },\n  { type:'Insights',   title:\"India's consumption story: separating signal from noise\",      meta:'Consumer Insight',       tags:['Consumption'] },\n  { type:'Confluence', title:'Navigating Uncertainty — Confluence 2024',                     meta:'45 speakers · 800 del.', tags:['Confluence'] },\n  { type:'Confluence', title:'India at the Inflection Point — Confluence 2023',              meta:'38 speakers · 720 del.', tags:['Confluence'] },\n  { type:'EN-Sights',  title:'EN-Sights #183: Fed pause and India rate trajectory',          meta:'21 Apr 2026',            tags:['Macro'] },\n  { type:'EN-Sights',  title:'EN-Sights #182: Nifty at 22,000 — support or resistance?',    meta:'14 Apr 2026',            tags:['Macro'] },\n  { type:'Podcast',    title:'Markets at the crossroads — Seshadri Sen',                     meta:'42 min',                 tags:['Macro'] },\n  { type:'Podcast',    title:'Banking sector outlook: post-merger landscape',                meta:'34 min',                 tags:['BFSI','RBI'] },\n  { type:'Capital Markets', title:'Emkay Capital Markets — Equities, IB, Brokerage',        meta:'Vertical',               tags:['BFSI','Technology'] },\n  { type:'Wealth',     title:'Emkay Wealth — HNI & Family Office Advisory',                 meta:'Vertical',               tags:['Macro'] },\n  { type:'Asset Mgmt', title:'Emkay Asset Management — E-QUAL PMS & AIF',                   meta:'Vertical',               tags:['Valuations'] },\n];\n\nfunction openSearchOverlay() {\n  overlay.classList.add('open');\n  document.body.style.overflow = 'hidden';\n  setTimeout(() => solInput.focus(), 200);\n}\nfunction closeSearchOverlay() {\n  overlay.classList.remove('open');\n  document.body.style.overflow = '';\n  solInput.value = '';\n  solResults.classList.remove('open');\n  solResults.innerHTML = '';\n}\n\nnavSearchBtn?.addEventListener('click', openSearchOverlay);\n\noverlay.addEventListener('click', e => {\n  if (e.target === overlay) closeSearchOverlay();\n});\n\ndocument.addEventListener('keydown', e => {\n  if (e.key === 'Escape') closeSearchOverlay();\n  if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); openSearchOverlay(); }\n});\n\nfunction runOverlaySearch(q) {\n  if (!q || q.length < 2) { solResults.classList.remove('open'); return; }\n  const lower = q.toLowerCase();\n  const matches = SEARCH_DATA.filter(d =>\n    d.title.toLowerCase().includes(lower) ||\n    d.meta.toLowerCase().includes(lower) ||\n    d.type.toLowerCase().includes(lower) ||\n    d.tags.some(t => t.toLowerCase().includes(lower))\n  ).slice(0, 8);\n\n  if (!matches.length) { solResults.classList.remove('open'); return; }\n\n  const groups = {};\n  matches.forEach(m => { (groups[m.type] = groups[m.type] || []).push(m); });\n\n  solResults.innerHTML = Object.entries(groups).map(([type, items]) =>\n    `<div class=\"sol-group\">\n      <div class=\"sol-group-label\">${type}<\u002Fdiv>\n      ${items.map(item =>\n        `<a class=\"sol-item\" href=\"Emkay Thought Leadership.html\">\n          <span class=\"sol-item-type\">${item.type}<\u002Fspan>\n          <span class=\"sol-item-title\">${item.title}<\u002Fspan>\n          <span class=\"sol-item-meta\">${item.meta}<\u002Fspan>\n        <\u002Fa>`\n      ).join('')}\n    <\u002Fdiv>`\n  ).join('');\n  solResults.classList.add('open');\n}\n\nsolInput?.addEventListener('input', e => runOverlaySearch(e.target.value.trim()));\nsolInput?.addEventListener('keydown', e => {\n  if (e.key === 'Enter' && solInput.value.trim()) window.location.href = 'Emkay Thought Leadership.html';\n});\n\n// ── DARK MODE ──\nfunction toggleDark(el) {\n  const isOn = el.classList.toggle('on');\n  document.documentElement.setAttribute('data-mode', isOn ? 'dark' : 'light');\n  localStorage.setItem('emkay-dark', isOn ? '1' : '');\n  window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { darkMode: isOn } }, '*');\n}\n// Restore dark mode\n(function(){\n  const saved = localStorage.getItem('emkay-dark');\n  if (saved === '1') {\n    document.documentElement.setAttribute('data-mode', 'dark');\n    document.getElementById('tweak-dark')?.classList.add('on');\n  }\n})();\n\n// ── SEARCH ENGINE ──\nconst hsInput  = document.getElementById('hs-input');\nconst hsResults = document.getElementById('hs-results');\n\nfunction runSearch(q) {\n  if (!q || q.length < 2) { hsResults.classList.remove('open'); return; }\n  const lower = q.toLowerCase();\n  const matches = SEARCH_DATA.filter(d =>\n    d.title.toLowerCase().includes(lower) ||\n    d.meta.toLowerCase().includes(lower) ||\n    d.tags.some(t => t.toLowerCase().includes(lower)) ||\n    d.type.toLowerCase().includes(lower)\n  ).slice(0, 6);\n\n  if (!matches.length) { hsResults.classList.remove('open'); return; }\n\n  // Group by type\n  const groups = {};\n  matches.forEach(m => { (groups[m.type] = groups[m.type] || []).push(m); });\n\n  hsResults.innerHTML = Object.entries(groups).map(([type, items]) =>\n    `<div class=\"hs-result-group\">\n      <div class=\"hs-result-group-label\">${type}<\u002Fdiv>\n      ${items.map(item =>\n        `<a class=\"hs-result-item\" href=\"Emkay Thought Leadership.html\">\n          <span class=\"hs-result-type\">${item.type}<\u002Fspan>\n          <span class=\"hs-result-title\">${item.title}<\u002Fspan>\n          <span class=\"hs-result-meta\">${item.meta}<\u002Fspan>\n        <\u002Fa>`\n      ).join('')}\n    <\u002Fdiv>`\n  ).join('');\n  hsResults.classList.add('open');\n}\n\nhsInput?.addEventListener('input', e => runSearch(e.target.value.trim()));\nhsInput?.addEventListener('keydown', e => {\n  if (e.key === 'Escape') { hsResults.classList.remove('open'); hsInput.blur(); }\n  if (e.key === 'Enter' && hsInput.value.trim()) window.location.href = 'Emkay Thought Leadership.html';\n});\ndocument.addEventListener('click', e => {\n  if (!e.target.closest('#hero-search')) hsResults.classList.remove('open');\n});\n\n// Animate search bar in after ctas\nsetTimeout(() => document.getElementById('hero-search')?.classList.add('anim-in'), 1200);\n\nconst TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n  \"showData\": true,\n  \"showUtil\": true,\n  \"showStats\": true,\n  \"showRings\": true,\n  \"heroBg\": \"dark\",\n  \"show_data\": true,\n  \"show_rings\": true,\n  \"show_stats\": true,\n  \"show_util\": true,\n  \"darkMode\": false,\n  \"darkBg\": \"charcoal\"\n}/*EDITMODE-END*/;\n\n// ── NAV SCROLL BEHAVIOR ──\nconst nav = document.getElementById('global-nav');\nconst utilBar = document.querySelector('.util-bar');\n\nfunction updateNav() {\n  const scrolled = window.scrollY > 20;\n  nav.classList.toggle('solid', scrolled);\n  // Also update L-grid fill in solid nav\n  const marks = nav.querySelectorAll('.logo-mark rect');\n  if (marks.length >= 4) {\n    marks[2].setAttribute('fill', scrolled ? '#004875' : 'white');\n    marks[3].setAttribute('fill', scrolled ? '#004875' : 'white');\n    marks[2].setAttribute('opacity', '0.85');\n    marks[3].setAttribute('opacity', '0.85');\n  }\n}\nwindow.addEventListener('scroll', updateNav, { passive: true });\nupdateNav();\n\n// ── TWEAKS ──\nfunction toggleTweak(key) {\n  const toggle = document.getElementById(`tweak-${key}`);\n  const isOn = toggle.classList.toggle('on');\n  const targets = {\n    data: '.data-strip',\n    util: '.util-bar',\n    stats: '.stats-bar',\n    rings: '.rings-teaser',\n  };\n  const el = document.querySelector(targets[key]);\n  if (el) el.style.display = isOn ? '' : 'none';\n  window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [`show_${key}`]: isOn } }, '*');\n}\n\nfunction setHeroBg(val) {\n  const hero = document.querySelector('.hero');\n  const colors = { navy: '#003357', blue: '#004875', dark: '#1a1f2e' };\n  hero.style.background = colors[val] || colors.navy;\n  window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { heroBg: val } }, '*');\n}\n\n// ── EDIT MODE ──\nwindow.addEventListener('message', e => {\n  if (e.data?.type === '__activate_edit_mode') {\n    document.getElementById('tweaks-panel').style.display = 'block';\n  }\n  if (e.data?.type === '__deactivate_edit_mode') {\n    document.getElementById('tweaks-panel').style.display = 'none';\n  }\n});\nwindow.parent.postMessage({ type: '__edit_mode_available' }, '*');\n<\u002Fscript>\n\n<\u002Fbody><\u002Fhtml>"
